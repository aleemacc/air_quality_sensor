# Untested code:
# This code hasn't yet been tested on the final PCB, it was writen for testing on a breadboard prototype

esphome:
  name: air-quality #Device name for esphome
  friendly_name: Air Quality #Device name displayed on the dashboard

esp32:
  board: seeed_xiao_esp32c6
  variant: ESP32C6
  framework:
    type: esp-idf

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "" #Here goes your autogenerated encryption key

ota:
  - platform: esphome
    password: "" #Here goes your password for Over The Air updates

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password #For your wifi ssid and password you shoud define them within your secrets in esphome

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Air-Quality Fallback Hotspot"
    password: "" #Password for your fallback hotspot

captive_portal:
    
####################

i2c: #Communication bus for the sensors
  sda: GPIO22
  scl: GPIO23
  scan: true #Scans for connected devices on the i2c bus

sensor: #Configuration for the SCD41 sensor
  - platform: scd4x
    co2:
      name: "CO2"
    temperature:
      id: scd41_temperature #ID used for internal reference
      name: "Temperatura SCD41" #Named displayed on the dashboard
    humidity:
      id: scd41_humidity #ID used for internal reference
      name: "Humedad SCD41" #Named displayed on the dashboard
    address: 0x62

  - platform: sgp4x
    voc:
      name: "VOC" #Named displayed on the dashboard
    nox:
      name: "NOx" #Named displayed on the dashboard
    address: 0x59
    compensation: #Uses data from the SCD41 to improve accuracy of gas readings
      temperature_source: scd41_temperature
      humidity_source: scd41_humidity

#TODO: MQ-6, MQ-7, display and buzzer haven't been implemented yet